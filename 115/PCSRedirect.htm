        function getUrlParam (url, paramName) {
            var regexS = "[\\?&]" + paramName + "=([^&#]*)";
            var regex = new RegExp(regexS);
            var results = regex.exec(url);
            return (results === null) ? "" : results[1];
        }
        var windowHref = window.location.href;
        var accountId = getUrlParam(windowHref, "accountid");
        var piid = getUrlParam(windowHref, "piid");
        var target = getUrlParam(windowHref, "target");
	if(piid == ""){
		piid = getUrlParam(windowHref, "id")
	}
        window.top.location.href = "ms-windows-store://PCSResult?accountid=" + accountId + "&piid=" + piid + "&target=" + target;
    //--></script></head><body></body></html>
